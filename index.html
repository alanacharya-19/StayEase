<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayEase - Premium Hotel Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var errDiv = document.getElementById('root');
        if (errDiv) errDiv.innerHTML = '<div style="padding:20px;font-family:monospace;background:#fee;color:#c00;border:2px solid #c00;margin:20px;border-radius:8px"><h2>JavaScript Error</h2><p><b>' + msg + '</b></p><p>at ' + url + ':' + line + ':' + col + '</p><p>' + (error ? error.stack : '') + '</p></div>';
        return true;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var errDiv = document.getElementById('root');
        if (errDiv) errDiv.innerHTML = '<div style="padding:20px;font-family:monospace;background:#fee;color:#c00;border:2px solid #c00;margin:20px;border-radius:8px"><h2>Unhandled Promise Rejection</h2><p><b>' + (e.reason ? e.reason.message || e.reason : 'Unknown') + '</b></p><p>' + (e.reason ? e.reason.stack : '') + '</p></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
